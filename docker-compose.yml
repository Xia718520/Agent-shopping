version: '3.8'

services:
  backend:
    build:
      context: ./Agent
      dockerfile: Dockerfile
    container_name: agent-backend
    ports:
      - "8000:8000"
      - "8501:8501"
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
    volumes:
      - ./Agent/chroma_db:/app/chroma_db
      - ./Agent/logs:/app/logs
      - ./Agent/data:/app/data
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agent-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always
